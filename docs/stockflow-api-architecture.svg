<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <rect width="800" height="200" rx="12" fill="#0d1117"/>

  <!-- GitHub -->
  <rect x="20" y="70" width="110" height="60" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="75" y="95" text-anchor="middle" fill="#58a6ff" font-size="20">⬡</text>
  <text x="75" y="118" text-anchor="middle" fill="#c9d1d9" font-size="11">GitHub Push</text>

  <!-- Arrow -->
  <line x1="130" y1="100" x2="158" y2="100" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GitHub Actions -->
  <rect x="160" y="70" width="110" height="60" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="215" y="95" text-anchor="middle" fill="#3fb950" font-size="18">⚙</text>
  <text x="215" y="110" text-anchor="middle" fill="#c9d1d9" font-size="10">GitHub</text>
  <text x="215" y="123" text-anchor="middle" fill="#c9d1d9" font-size="10">Actions CI/CD</text>

  <!-- Arrow -->
  <line x1="270" y1="100" x2="298" y2="100" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Docker Hub -->
  <rect x="300" y="70" width="110" height="60" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="355" y="95" text-anchor="middle" fill="#2496ed" font-size="18">🐋</text>
  <text x="355" y="110" text-anchor="middle" fill="#c9d1d9" font-size="10">Docker Build</text>
  <text x="355" y="123" text-anchor="middle" fill="#c9d1d9" font-size="10">+ Docker Hub</text>

  <!-- Arrow -->
  <line x1="410" y1="100" x2="438" y2="100" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Azure App Service -->
  <rect x="440" y="70" width="110" height="60" rx="8" fill="#21262d" stroke="#0078d4" stroke-width="1.5"/>
  <text x="495" y="95" text-anchor="middle" fill="#0078d4" font-size="18">☁</text>
  <text x="495" y="110" text-anchor="middle" fill="#c9d1d9" font-size="10">Azure App</text>
  <text x="495" y="123" text-anchor="middle" fill="#c9d1d9" font-size="10">Service</text>

  <!-- Arrow -->
  <line x1="550" y1="100" x2="578" y2="100" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Azure SQL -->
  <rect x="580" y="70" width="110" height="60" rx="8" fill="#21262d" stroke="#0078d4" stroke-width="1.5"/>
  <text x="635" y="95" text-anchor="middle" fill="#0078d4" font-size="18">🗄</text>
  <text x="635" y="110" text-anchor="middle" fill="#c9d1d9" font-size="10">Azure SQL</text>
  <text x="635" y="123" text-anchor="middle" fill="#c9d1d9" font-size="10">Database</text>

  <!-- Arrow -->
  <line x1="690" y1="100" x2="718" y2="100" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- App Insights -->
  <rect x="720" y="70" width="60" height="60" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="750" y="95" text-anchor="middle" fill="#f78166" font-size="16">📊</text>
  <text x="750" y="112" text-anchor="middle" fill="#c9d1d9" font-size="9">App</text>
  <text x="750" y="123" text-anchor="middle" fill="#c9d1d9" font-size="9">Insights</text>

  <!-- Title -->
  <text x="400" y="170" text-anchor="middle" fill="#8b949e" font-size="11">Stockflow API — CI/CD &amp; Cloud Architecture</text>

  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#30363d"/>
    </marker>
  </defs>
</svg>
